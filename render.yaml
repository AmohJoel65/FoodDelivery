# render.yaml — Render deployment config for Joel's Kitchen backend
# Commit this file to your repo root; Render auto-detects it.
#
# Docs: https://render.com/docs/blueprint-spec

services:
  - type: web
    name: joels-kitchen-api
    runtime: node
    region: frankfurt          # closest region for Cameroon users
    plan: free                 # upgrade to starter ($7/mo) for persistent disk
    rootDir: backend           # backend lives in /backend sub-folder
    buildCommand: npm install
    startCommand: node server.js
    healthCheckPath: /api/health

    # ── Environment Variables ──────────────────────────────────────────────
    # Set these in the Render dashboard (Settings > Environment):
    # DO NOT store secrets in this file.
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 4000
      - key: FRONTEND_URL
        sync: false          # fill in manually in Render dashboard after Vercel deploy
      - key: JWT_SECRET
        generateValue: true  # Render auto-generates a secure random value
      - key: SMTP_HOST
        value: smtp.gmail.com
      - key: SMTP_PORT
        value: 587
      - key: SMTP_USER
        sync: false          # joelamoh65@gmail.com
      - key: SMTP_PASS
        sync: false          # Gmail App Password
      - key: SMTP_FROM
        sync: false          # "Joel's Kitchen <joelamoh65@gmail.com>"
      - key: OWNER_EMAIL
        value: joelamoh65@gmail.com

    # ── Persistent Disk (required for file-based db.json) ─────────────────
    # Free tier does NOT have persistent storage — the disk resets on redeploy.
    # Upgrade to Starter plan and uncomment the block below:
    #
    # disk:
    #   name: joels-kitchen-data
    #   mountPath: /opt/render/project/src/backend/data
    #   sizeGB: 1
